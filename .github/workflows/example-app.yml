name: Example App Workflow

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-example-app:
    name: Example App Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run example app smoke workflow
        run: bun run test:example-app
