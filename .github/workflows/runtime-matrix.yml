name: Runtime Matrix

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  runtime-node:
    name: Runtime Smoke (Node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Node runtime smoke test
        run: bun run test:runtime:node

  runtime-bun:
    name: Runtime Smoke (Bun)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun runtime smoke test
        run: bun run test:runtime:bun

  runtime-deno:
    name: Runtime Smoke (Deno)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      - name: Run Deno runtime smoke test
        run: deno run --allow-read --node-modules-dir=auto scripts/runtime/smoke.ts
